name: Deploy to GitHub Pages

# 手動実行（Actions タブ → Run workflow）または main への push でビルドして Pages へ配置する。
# フィーチャーブランチの push では動かない（不意のデプロイを避けるため）。
# 事前に一度だけ: リポジトリ Settings → Pages → Build and deployment → Source = "GitHub Actions" を選ぶ。
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ（古いデプロイをキャンセル）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
